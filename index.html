<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Anniversary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#3e2a1e",
              "ink-soft": "#5c4632",
              parchment: "#fdf6e7",
              wax: "#8b0000",
              "wax-deep": "#6b0000",
              gold: "#c9a35f",
            },
            fontFamily: {
              serif: ["Lora", "serif"],
              handwriting: ["Caveat", "cursive"],
            },
          },
        },
      };
    </script>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        background-color: #eaddcf;
        background-image:
          radial-gradient(
            circle at 15% 20%,
            rgba(255, 255, 255, 0.25),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 80%,
            rgba(139, 0, 0, 0.05),
            transparent 50%
          );
      }

      .letter-container {
        background-color: #fdf6e7;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(62, 42, 30, 0.025) 0px,
          rgba(62, 42, 30, 0.025) 1px,
          transparent 1px,
          transparent 32px
        );
        box-shadow:
          0 10px 40px rgba(62, 42, 30, 0.18),
          0 1px 0 rgba(255, 255, 255, 0.4) inset;
      }

      /* ===== LOCK SCREEN DECORATIVE LAYER ===== */

      /* Animated floating particles */
      @keyframes floatUp {
        0% {
          transform: translateY(0) translateX(0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100vh) translateX(var(--drift)) scale(0.5);
          opacity: 0;
        }
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.4);
        }
      }
      @keyframes shimmerText {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      @keyframes pulseRing {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(201, 163, 95, 0.5);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 18px rgba(201, 163, 95, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(201, 163, 95, 0);
        }
      }
      @keyframes rotateSlow {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes rotateCCW {
        to {
          transform: rotate(-360deg);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.15);
        }
        28% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.08);
        }
        70% {
          transform: scale(1);
        }
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: floatUp linear infinite;
      }
      .star-particle {
        position: absolute;
        color: rgba(201, 163, 95, 0.7);
        pointer-events: none;
        animation: twinkle ease-in-out infinite;
        font-size: 10px;
      }

      .shimmer-text {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.7) 0%,
          rgba(255, 255, 255, 1) 30%,
          rgba(201, 163, 95, 1) 50%,
          rgba(255, 255, 255, 1) 70%,
          rgba(255, 255, 255, 0.7) 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmerText 4s linear infinite;
      }

      .lock-bg-layer {
        background-position: center;
      }

      /* Corner ornament rings */
      .corner-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(201, 163, 95, 0.25);
        pointer-events: none;
      }

      /* Rotating decorative halos around seal */
      .halo-outer {
        position: absolute;
        inset: -24px;
        border-radius: 50%;
        border: 1px dashed rgba(201, 163, 95, 0.35);
        animation: rotateSlow 20s linear infinite;
      }
      .halo-inner {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        animation: rotateCCW 14s linear infinite;
      }
      /* Dots on the outer halo */
      .halo-dot {
        position: absolute;
        width: 5px;
        height: 5px;
        background: rgba(201, 163, 95, 0.7);
        border-radius: 50%;
        top: 50%;
        left: 0;
        transform: translateY(-50%) translateX(-2.5px);
      }

      /* Wax seal */
      .seal {
        position: relative;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #a30f0f, #6b0000 70%);
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.45),
          inset 0 2px 6px rgba(255, 255, 255, 0.25),
          inset 0 -6px 14px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: none;
        padding: 0;
        animation:
          pulseRing 2.5s ease-out infinite,
          heartbeat 2s ease-in-out infinite;
      }
      .seal::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 6% 38%, #6b0000 0 9px, transparent 10px),
          radial-gradient(circle at 18% 12%, #6b0000 0 7px, transparent 8px),
          radial-gradient(circle at 94% 28%, #6b0000 0 8px, transparent 9px),
          radial-gradient(circle at 88% 62%, #6b0000 0 10px, transparent 11px),
          radial-gradient(circle at 62% 95%, #6b0000 0 9px, transparent 10px),
          radial-gradient(circle at 28% 93%, #6b0000 0 7px, transparent 8px),
          radial-gradient(circle at 40% 3%, #6b0000 0 6px, transparent 7px);
        z-index: -1;
        opacity: 0.85;
      }
      .seal:hover {
        transform: scale(1.06);
      }
      .seal-glyph {
        font-size: 2.2rem;
        color: rgba(253, 246, 231, 0.92);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        user-select: none;
      }
      .seal.is-cracking {
        animation: seal-crack 0.7s ease forwards;
      }
      @keyframes seal-crack {
        0% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
        35% {
          transform: scale(1.12) rotate(-4deg);
        }
        100% {
          transform: scale(1.5) rotate(8deg);
          opacity: 0;
        }
      }

      /* Decorative divider lines */
      .ornament-line {
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0.6;
      }
      .ornament-line::before,
      .ornament-line::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(201, 163, 95, 0.8),
          transparent
        );
      }

      /* Bottom date badge */
      .date-badge {
        background: linear-gradient(
          135deg,
          rgba(107, 0, 0, 0.6),
          rgba(139, 0, 0, 0.4)
        );
        border: 1px solid rgba(201, 163, 95, 0.35);
        backdrop-filter: blur(4px);
      }

      /* Timeline */
      .timeline-card {
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .timeline-card.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }

      /* ===== PIN MODAL ===== */
      #pin-modal-inner {
        background: linear-gradient(
          135deg,
          #3b1460 0%,
          #7a1f6e 50%,
          #c2418f 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      #pin-input {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #fff;
      }
      #pin-input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
      #pin-input:focus {
        outline: 2px solid rgba(232, 138, 168, 0.8);
        outline-offset: 0;
      }
      .pin-btn-cancel {
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: #fff;
        background: transparent;
        transition: background 0.2s;
      }
      .pin-btn-cancel:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .pin-btn-submit {
        background: linear-gradient(135deg, #e88aa8, #c2418f);
        color: #fff;
        border: none;
        transition: opacity 0.2s;
      }
      .pin-btn-submit:hover {
        opacity: 0.88;
      }
    </style>
  </head>
  <body class="text-ink font-serif min-h-screen relative overflow-x-hidden">
    <audio id="bg-music" src="your-music-file.mp3" loop preload="none"></audio>

    <!-- ============ LOCK SCREEN ============ -->
    <div
      id="lock-screen"
      class="fixed inset-0 z-50 flex flex-col items-center justify-center transition-opacity duration-1000 opacity-100"
    >
      <!-- Photo bg layers -->
      <div
        id="lock-screen-bg1"
        class="lock-bg-layer absolute inset-0 transition-opacity duration-1000 opacity-100"
      ></div>
      <div
        id="lock-screen-bg2"
        class="lock-bg-layer absolute inset-0 transition-opacity duration-1000 opacity-0"
      ></div>

      <!-- Dark gradient overlay -->
      <div
        class="absolute inset-0"
        style="
          background: linear-gradient(
            160deg,
            rgba(59, 20, 96, 0.72) 0%,
            rgba(30, 10, 50, 0.55) 40%,
            rgba(194, 65, 143, 0.45) 100%
          );
        "
      ></div>
      <div
        class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/60"
      ></div>

      <!-- Floating particles container -->
      <div
        id="particles-container"
        class="absolute inset-0 overflow-hidden pointer-events-none"
      ></div>

      <!-- Star particles container -->
      <div
        id="stars-container"
        class="absolute inset-0 overflow-hidden pointer-events-none"
      ></div>

      <!-- Corner decorative rings (top-left) -->
      <div
        class="absolute top-0 left-0 w-64 h-64 pointer-events-none"
        style="transform: translate(-40%, -40%)"
      >
        <div
          class="corner-ring absolute inset-0"
          style="animation: rotateSlow 30s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 16px; animation: rotateCCW 22s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 32px; animation: rotateSlow 18s linear infinite"
        ></div>
      </div>
      <!-- Corner rings top-right -->
      <div
        class="absolute top-0 right-0 w-48 h-48 pointer-events-none"
        style="transform: translate(40%, -40%)"
      >
        <div
          class="corner-ring absolute inset-0"
          style="animation: rotateCCW 25s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 14px; animation: rotateSlow 16s linear infinite"
        ></div>
      </div>
      <!-- Corner rings bottom-left -->
      <div
        class="absolute bottom-0 left-0 w-48 h-48 pointer-events-none"
        style="transform: translate(-40%, 40%)"
      >
        <div
          class="corner-ring absolute inset-0"
          style="animation: rotateSlow 28s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 14px; animation: rotateCCW 20s linear infinite"
        ></div>
      </div>
      <!-- Corner rings bottom-right -->
      <div
        class="absolute bottom-0 right-0 w-64 h-64 pointer-events-none"
        style="transform: translate(40%, 40%)"
      >
        <div
          class="corner-ring absolute inset-0"
          style="animation: rotateCCW 32s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 16px; animation: rotateSlow 24s linear infinite"
        ></div>
        <div
          class="corner-ring absolute"
          style="inset: 32px; animation: rotateCCW 17s linear infinite"
        ></div>
      </div>

      <!-- Top ornamental text -->
      <div
        class="absolute top-6 sm:top-8 left-0 right-0 flex flex-col items-center pointer-events-none"
        style="animation: fadeInUp 1.2s ease both"
      >
        <div class="ornament-line w-48 sm:w-64 mb-1">
          <i class="fa-solid fa-diamond text-gold/60 text-[8px]"></i>
        </div>
        <p class="font-handwriting text-white/60 text-base tracking-[0.2em]">
          CJay &amp; Ayen
        </p>
        <div class="ornament-line w-48 sm:w-64 mt-1">
          <i class="fa-solid fa-diamond text-gold/60 text-[8px]"></i>
        </div>
      </div>

      <!-- Central card -->
      <div
        class="relative text-center px-8 py-10 sm:px-12 sm:py-12 rounded-3xl max-w-sm w-full mx-4 text-white"
        style="
          background: transparent;
          backdrop-filter: none;
          border: 1px solid rgba(201, 163, 95, 0.35);
          box-shadow: none;
          animation: fadeInUp 1s ease 0.3s both;
        "
      >
        <!-- Seal with halos -->
        <div class="relative mx-auto mb-8" style="width: 120px; height: 120px">
          <div class="halo-outer">
            <div class="halo-dot"></div>
            <div
              class="halo-dot"
              style="
                top: 25%;
                left: 100%;
                transform: translateY(-50%) translateX(-2.5px) rotate(0deg);
              "
            ></div>
            <div
              class="halo-dot"
              style="
                top: 75%;
                left: 100%;
                transform: translateY(-50%) translateX(-2.5px);
              "
            ></div>
            <div
              class="halo-dot"
              style="
                top: 100%;
                left: 50%;
                transform: translateX(-50%) translateY(-2.5px);
              "
            ></div>
          </div>
          <div class="halo-inner"></div>
          <button
            id="seal-button"
            class="seal"
            type="button"
            aria-label="Unlock the anniversary letter"
            onclick="openPinModal()"
          >
            <i class="fa-solid fa-heart seal-glyph" aria-hidden="true"></i>
          </button>
        </div>

        <!-- Title -->
        <h1
          class="shimmer-text font-handwriting text-4xl sm:text-5xl mb-1 leading-tight"
        >
          Happy Anniversary
        </h1>
        <p class="text-white/50 text-xs tracking-[0.3em] uppercase mb-6">
          July 15, 2026
        </p>

        <!-- Divider -->
        <div class="ornament-line mb-6 opacity-40">
          <i class="fa-solid fa-heart text-[8px] text-gold"></i>
        </div>

        <button
          onclick="openPinModal()"
          class="w-full py-3 rounded-full text-sm font-semibold uppercase tracking-widest transition-all duration-300"
          style="
            background: linear-gradient(
              135deg,
              rgba(139, 0, 0, 0.7),
              rgba(107, 0, 0, 0.5)
            );
            border: 1px solid rgba(201, 163, 95, 0.5);
            color: rgba(253, 246, 231, 0.95);
            box-shadow: 0 4px 16px rgba(139, 0, 0, 0.3);
          "
        >
          <i class="fa-solid fa-envelope-open-text mr-2 text-gold/80"></i>
          Unlock Letter
        </button>
      </div>

      <!-- Bottom: date badge + small note -->
      <div
        class="absolute bottom-6 sm:bottom-8 left-0 right-0 flex flex-col items-center gap-2 pointer-events-none"
        style="animation: fadeInUp 1.4s ease 0.6s both"
      ></div>
    </div>

    <!-- ============ PIN MODAL ============ -->
    <div
      id="pin-modal"
      class="fixed inset-0 hidden items-center justify-center bg-black/60 p-4 z-50"
      role="dialog"
      aria-modal="true"
      aria-labelledby="pin-modal-title"
    >
      <div
        id="pin-modal-inner"
        class="w-full max-w-md rounded-3xl p-8 shadow-2xl"
      >
        <h2 id="pin-modal-title" class="text-2xl font-semibold mb-2 text-white">
          Enter PIN
        </h2>
        <p class="text-sm mb-6 text-white/75">
          Enter the 6-digit code to unlock the letter.
        </p>
        <input
          id="pin-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          autocomplete="one-time-code"
          aria-describedby="pin-error"
          class="w-full rounded-2xl p-4 text-xl font-semibold outline-none tracking-[0.3em] text-center"
          placeholder="••••••"
        />
        <p
          id="pin-error"
          class="mt-3 text-sm text-pink-200 hidden"
          role="alert"
        >
          Incorrect PIN. Try again.
        </p>
        <div class="mt-6 flex items-center justify-end gap-3">
          <button
            onclick="closePinModal()"
            class="pin-btn-cancel rounded-full px-4 py-2 text-sm uppercase tracking-widest"
          >
            Cancel
          </button>
          <button
            onclick="submitPin()"
            class="pin-btn-submit rounded-full px-4 py-2 text-sm uppercase tracking-widest font-semibold"
          >
            Submit
          </button>
        </div>
      </div>
    </div>

    <!-- ============ LETTER CONTENT ============ -->
    <div
      id="letter-content"
      class="opacity-0 hidden max-w-3xl mx-auto py-12 px-4 sm:px-8 relative z-10 transition-opacity duration-1000"
    >
      <div class="letter-container p-8 sm:p-16 relative rounded-sm">
        <button
          onclick="returnToLockScreen()"
          class="absolute right-6 top-6 sm:right-8 sm:top-8 rounded-full border border-ink/70 bg-parchment/90 px-4 py-2 text-xs sm:text-sm font-semibold uppercase tracking-wide text-ink transition hover:bg-ink hover:text-parchment"
        >
          <i class="fa-solid fa-arrow-left mr-1" aria-hidden="true"></i> Back
        </button>
        <div class="text-center mb-16">
          <p class="font-handwriting text-2xl sm:text-3xl text-gold mb-2">
            CJay &amp; Ayen
          </p>
          <h1 class="font-handwriting text-5xl sm:text-6xl text-wax mb-4">
            Happy Anniversary
          </h1>
          <p class="text-lg italic text-ink-soft">
            The journey of our first 12 months&hellip;
          </p>
          <div class="w-16 h-[2px] bg-gold/70 mx-auto mt-6"></div>
        </div>
        <div class="relative p-2 sm:p-6">
          <div id="timeline-wrapper" class="w-full relative"></div>
        </div>
        <div class="mt-16 text-center">
          <div class="w-16 h-[1px] bg-ink/40 mx-auto mb-6"></div>
          <p class="font-handwriting text-3xl mt-4">With all my love,</p>
          <p class="font-handwriting text-2xl mt-2 text-wax">CJay</p>
        </div>
      </div>
    </div>

    <!-- ============ MONTH MODAL ============ -->
    <div
      id="month-modal"
      class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4 z-50"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div
        class="relative w-full max-w-4xl rounded-3xl bg-parchment p-6 sm:p-10 shadow-2xl border border-ink/30"
      >
        <button
          onclick="closeMonthModal()"
          aria-label="Close"
          class="absolute right-4 top-4 text-ink/70 hover:text-wax transition-colors"
        >
          <i class="fa-solid fa-xmark fa-lg" aria-hidden="true"></i>
        </button>
        <h3
          id="modal-month"
          class="text-wax text-sm uppercase tracking-widest mb-2 font-semibold"
        ></h3>
        <h2 id="modal-title" class="text-3xl font-bold mb-4"></h2>
        <p
          id="modal-text"
          class="text-base italic leading-relaxed text-ink-soft"
        ></p>
        <div class="mt-8 text-right">
          <button
            onclick="closeMonthModal()"
            class="inline-flex rounded-full border border-ink px-5 py-2 text-sm font-semibold uppercase tracking-wide text-ink transition hover:bg-ink hover:text-parchment"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script>
      // =========================================================
      // Particle system
      // =========================================================
      function createParticles() {
        const container = document.getElementById("particles-container");
        const colors = [
          "rgba(201,163,95,0.6)",
          "rgba(255,255,255,0.5)",
          "rgba(194,65,143,0.5)",
          "rgba(232,138,168,0.5)",
          "rgba(107,0,0,0.5)",
        ];
        for (let i = 0; i < 28; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 6 + 2;
          const left = Math.random() * 100;
          const delay = Math.random() * 12;
          const duration = Math.random() * 10 + 8;
          const drift = (Math.random() - 0.5) * 120;
          const color = colors[Math.floor(Math.random() * colors.length)];
          p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${left}%; bottom:-10px;
            background:${color};
            --drift:${drift}px;
            animation-delay:${delay}s;
            animation-duration:${duration}s;
          `;
          container.appendChild(p);
        }
      }

      function createStars() {
        const container = document.getElementById("stars-container");
        const icons = ["✦", "✧", "·", "⋆", "✶"];
        for (let i = 0; i < 35; i++) {
          const s = document.createElement("div");
          s.className = "star-particle";
          const left = Math.random() * 100;
          const top = Math.random() * 100;
          const delay = Math.random() * 5;
          const duration = Math.random() * 3 + 2;
          const icon = icons[Math.floor(Math.random() * icons.length)];
          s.style.cssText = `left:${left}%; top:${top}%; animation-delay:${delay}s; animation-duration:${duration}s; font-size:${Math.random() * 8 + 6}px;`;
          s.textContent = icon;
          container.appendChild(s);
        }
      }

      // =========================================================
      // Timeline data
      // =========================================================
      const timelineData = [
        {
          month: "Month 1",
          title: "August 15, 2025",
          text: "Where it all started. The first time we really connected.",
        },

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function renderTimeline() {
        const wrapper = document.getElementById("timeline-wrapper");
        let html = "";
        const lastIndex = timelineData.length - 1;
        timelineData.forEach((item, index) => {
          const isFinal = index === lastIndex;
          const markerSize = "w-9 h-9 sm:w-11 sm:h-11 text-sm sm:text-base";
          const markerColors = isFinal
            ? "bg-wax-deep shadow-lg ring-4 ring-gold/50"
            : "bg-wax shadow-md";
          const card = isFinal
            ? "bg-gradient-to-br from-[#fdf8f0] to-[#fbeecb] shadow-lg hover:shadow-xl ring-2 ring-gold border-gold/60"
            : "bg-[#fffdf7] shadow-md hover:shadow-lg border-ink/25";
          const monthLabel = isFinal
            ? `<h3 class="mb-1 font-semibold text-wax-deep text-xs sm:text-sm uppercase tracking-wider">${escapeHtml(item.month)} &middot; Our Anniversary</h3>`
            : `<h3 class="mb-1 font-semibold text-wax text-xs sm:text-sm uppercase tracking-wider">${escapeHtml(item.month)}</h3>`;
          const button = isFinal
            ? `<button onclick="openMonthModal(${index})" class="self-start sm:self-center shrink-0 inline-flex items-center justify-center rounded-full bg-wax-deep border border-wax-deep px-4 py-1.5 text-[10px] sm:text-xs font-semibold uppercase tracking-widest text-parchment whitespace-nowrap transition hover:bg-wax hover:border-wax" aria-label="View letter for ${escapeHtml(item.month)}"><i class="fa-solid fa-heart mr-1.5" aria-hidden="true"></i> View Letter</button>`
            : `<button onclick="openMonthModal(${index})" class="self-start sm:self-center shrink-0 inline-flex items-center justify-center rounded-full border border-ink/60 px-3 py-1.5 text-[10px] sm:text-xs font-semibold uppercase tracking-widest text-ink whitespace-nowrap transition hover:bg-ink hover:text-parchment" aria-label="View letter for ${escapeHtml(item.month)}">View Letter</button>`;
          html += `
            <div class="relative ${isFinal ? "mb-2" : "mb-7"} flex items-center gap-3 sm:gap-4 timeline-card" data-index="${index}">
              <div class="relative shrink-0 z-20 flex items-center justify-center ${markerSize} ${markerColors} rounded-full border-2 border-parchment text-parchment font-semibold timeline-marker">
                ${isFinal ? `<i class="fa-solid fa-star" aria-hidden="true"></i>` : index + 1}
              </div>
              <div class="${card} transition-shadow w-full px-4 py-4 sm:px-6 sm:py-5 ${isFinal ? "border" : "border-2"} rounded-lg">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-6">
                  <div class="min-w-0">${monthLabel}<h4 class="font-bold text-base sm:text-lg leading-snug ${isFinal ? "text-wax-deep" : ""}">${escapeHtml(item.title)}</h4></div>
                  ${button}
                </div>
              </div>
            </div>`;
        });
        wrapper.innerHTML = html;
        requestAnimationFrame(() => requestAnimationFrame(drawConnectors));
        const cards = wrapper.querySelectorAll(".timeline-card");
        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        if (prefersReducedMotion || !("IntersectionObserver" in window)) {
          cards.forEach((c) => c.classList.add("is-visible"));
          return;
        }
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.15, rootMargin: "0px 0px -40px 0px" },
        );
        cards.forEach((c) => observer.observe(c));
      }

      function drawConnectors() {
        const wrapper = document.getElementById("timeline-wrapper");
        wrapper
          .querySelectorAll(".timeline-connector")
          .forEach((el) => el.remove());
        const markers = Array.from(
          wrapper.querySelectorAll(".timeline-marker"),
        );
        for (let i = 0; i < markers.length - 1; i++) {
          const current = markers[i];
          const next = markers[i + 1];
          const row = current.parentElement;
          const nextRow = next.parentElement;
          const centerX = current.offsetLeft + current.offsetWidth / 2;
          const startY =
            row.offsetTop + current.offsetTop + current.offsetHeight;
          const endY = nextRow.offsetTop + next.offsetTop;
          const height = Math.max(endY - startY, 0);
          const connector = document.createElement("div");
          connector.className = "timeline-connector";
          connector.setAttribute("aria-hidden", "true");
          connector.style.cssText = `position:absolute; left:${centerX}px; top:${startY}px; width:3px; height:${height}px; margin-left:-1.5px; background:linear-gradient(180deg,#8b0000,#c9a35f); border-radius:2px; z-index:1;`;
          wrapper.appendChild(connector);
        }
      }

      window.addEventListener("resize", () => {
        clearTimeout(window._connectorResizeTimer);
        window._connectorResizeTimer = setTimeout(drawConnectors, 150);
      });

        document.body.classList.add("overflow-hidden");
        modal.querySelector("button[aria-label='Close']").focus();
      }
      function closeMonthModal() {
        const modal = document.getElementById("month-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        document.body.classList.remove("overflow-hidden");
        if (lastFocusedBeforeMonthModal) lastFocusedBeforeMonthModal.focus();
      }
      document.getElementById("month-modal").addEventListener("click", (e) => {
        if (e.target.id === "month-modal") closeMonthModal();
      });

      // =========================================================
      // PIN
      // =========================================================
      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = (hash << 5) - hash + str.charCodeAt(i);
          hash |= 0;
        }
        return hash.toString(16);
      }
      const PIN_HASH = "5506bdee"; // simpleHash("071525")

      function openPinModal() {
        const modal = document.getElementById("pin-modal");
        document.getElementById("pin-input").value = "";
        document.getElementById("pin-error").classList.add("hidden");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        setTimeout(() => document.getElementById("pin-input").focus(), 100);
      }
      function closePinModal() {
        const modal = document.getElementById("pin-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }
      document.getElementById("pin-modal").addEventListener("click", (e) => {
        if (e.target.id === "pin-modal") closePinModal();
      });
      function submitPin() {
        const input = document.getElementById("pin-input");
        const error = document.getElementById("pin-error");
        const cleaned = input.value.replace(/[^0-9]/g, "");
        if (simpleHash(cleaned) === PIN_HASH) {
          closePinModal();
          crackSealAndUnlock();
          return;
        }
        error.classList.remove("hidden");
        input.focus();
        input.select();
      }
      document.getElementById("pin-input").addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, "");
      });
      document.getElementById("pin-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          submitPin();
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (
          !document.getElementById("month-modal").classList.contains("hidden")
        )
          closeMonthModal();
        if (!document.getElementById("pin-modal").classList.contains("hidden"))
          closePinModal();
      });

      function crackSealAndUnlock() {
        const sealButton = document.getElementById("seal-button");
        sealButton.classList.add("is-cracking");
        sealButton.disabled = true;
        setTimeout(unlockLetter, 350);

      function unlockLetter() {
        const lockScreen = document.getElementById("lock-screen");
        const letterContent = document.getElementById("letter-content");
        const music = document.getElementById("bg-music");
        music.play().catch((err) => console.log("Audio play failed:", err));
        lockScreen.classList.remove("opacity-100");
        lockScreen.classList.add("opacity-0", "pointer-events-none");
        setTimeout(() => {
          lockScreen.classList.add("hidden");
          letterContent.classList.remove("hidden");
          requestAnimationFrame(() => {
            letterContent.classList.remove("opacity-0");
            letterContent.classList.add("opacity-100");
            requestAnimationFrame(() => requestAnimationFrame(drawConnectors));
          });
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 1000);
      }
      function returnToLockScreen() {
        const lockScreen = document.getElementById("lock-screen");
        const letterContent = document.getElementById("letter-content");
        const music = document.getElementById("bg-music");
        const sealButton = document.getElementById("seal-button");
        letterContent.classList.add("opacity-0", "pointer-events-none");
        lockScreen.classList.remove("hidden");
        sealButton.classList.remove("is-cracking");
        sealButton.disabled = false;
        requestAnimationFrame(() => {
          lockScreen.classList.remove("opacity-0", "pointer-events-none");
          lockScreen.classList.add("opacity-100");
        });
        music.pause();
        music.currentTime = 0;
        setTimeout(() => {
          letterContent.classList.add("hidden");
          letterContent.classList.remove("pointer-events-none");
        }, 1000);
      }

      let currentLockBg = 0;
      const bg1 = document.getElementById("lock-screen-bg1");
      const bg2 = document.getElementById("lock-screen-bg2");
      const preloadedImages = new Set();

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }
      function preloadImage(src) {
        if (preloadedImages.has(src)) return;
        preloadedImages.add(src);
        const img = new Image();
        img.src = src;
      }
      function setLockBackground(index) {
        const nextImage = lockBgImages[index];
        if (!nextImage) return;
        preloadImage(lockBgImages[(index + 1) % lockBgImages.length]);
        preloadImage(lockBgImages[(index + 2) % lockBgImages.length]);
        const purplePinkGradient =
          "linear-gradient(135deg, #6a2c91 0%, #c2418f 50%, #e88aa8 100%)";
        const layeredBg = `url('${nextImage}'), ${purplePinkGradient}`;
        const layeredSize = "contain, cover";
        const layeredRepeat = "no-repeat, no-repeat";
        bg2.style.backgroundImage = layeredBg;
        bg2.style.backgroundSize = layeredSize;
        bg2.style.backgroundRepeat = layeredRepeat;
        bg2.classList.add("opacity-100");
        bg1.classList.remove("opacity-100");
        setTimeout(() => {
          bg1.style.backgroundImage = layeredBg;
          bg1.style.backgroundSize = layeredSize;
          bg1.style.backgroundRepeat = layeredRepeat;
          bg1.classList.add("opacity-100");
          bg2.classList.remove("opacity-100");
        }, 1000);
      }
      function rotateLockBackground() {
        currentLockBg = (currentLockBg + 1) % lockBgImages.length;
        setLockBackground(currentLockBg);
      }
      function initLockBackgrounds() {
        if (lockBgImages.length === 0) return;
        shuffleArray(lockBgImages);
        setLockBackground(0);
        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        if (!prefersReducedMotion) setInterval(rotateLockBackground, 6000);
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderTimeline();
        initLockBackgrounds();
        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        if (!prefersReducedMotion) {
          createParticles();
          createStars();
        }
