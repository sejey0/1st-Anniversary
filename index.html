<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Anniversary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#3e2a1e",
              parchment: "#fdf6e7",
              wax: "#8b0000",
            },
            fontFamily: {
              serif: ["Lora", "serif"],
              handwriting: ["Caveat", "cursive"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #eaddcf;
        background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
      }
      .letter-container {
        background-color: #fdf6e7;
        background-image: url("https://www.transparenttextures.com/patterns/old-wall.png");
        box-shadow: 0 10px 40px rgba(62, 42, 30, 0.15);
      }
    </style>
  </head>
  <body class="text-ink font-serif min-h-screen relative overflow-x-hidden">
    <audio id="bg-music" src="your-music-file.mp3" loop></audio>

    <div
      id="lock-screen"
      class="fixed inset-0 z-50 flex flex-col items-center justify-center transition-opacity duration-1000 opacity-100 bg-gradient-to-r from-pink-300 via-transparent to-purple-700"
    >
      <div
        id="lock-screen-bg1"
        class="absolute inset-0 bg-contain bg-center bg-no-repeat transition-opacity duration-1000 opacity-100"
      ></div>
      <div
        id="lock-screen-bg2"
        class="absolute inset-0 bg-contain bg-center bg-no-repeat transition-opacity duration-1000 opacity-0"
      ></div>
      <div class="absolute inset-0 bg-[#eaddcf]/30"></div>
      <div
        class="relative text-center p-8 border border-white/80 rounded-3xl bg-white/10 shadow-xl max-w-sm w-full mx-4 text-white"
      >
        <i class="fa-solid fa-lock text-4xl text-white mb-4"></i>
        <h1 class="text-2xl mb-2 font-semibold">A Year Together</h1>
        <p class="text-sm italic mb-8">
          This letter is sealed. Click to open our memories.
        </p>
        <button
          onclick="openPinModal()"
          class="px-6 py-2 border border-white/80 text-white hover:bg-white/20 transition-colors duration-300 font-medium tracking-widest uppercase text-sm"
        >
          Unlock Letter
        </button>
      </div>
    </div>

    <div
      id="pin-modal"
      class="fixed inset-0 hidden flex items-center justify-center bg-black/70 p-4 z-50"
    >
      <div
        class="w-full max-w-md rounded-3xl bg-slate-950/95 border border-white/20 p-8 text-white shadow-2xl"
      >
        <h2 class="text-2xl font-semibold mb-4">Enter PIN</h2>
        <p class="text-sm text-slate-300 mb-6">
          Enter the 6-digit code to unlock the letter.
        </p>
        <input
          id="pin-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          autocomplete="one-time-code"
          class="w-full rounded-2xl border border-white/20 bg-white/10 p-4 text-xl font-semibold text-white outline-none placeholder:text-slate-400"
          placeholder="Enter PIN"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        />
        <p id="pin-error" class="mt-3 text-sm text-rose-300 hidden">
          Incorrect PIN. Try again.
        </p>
        <div class="mt-6 flex items-center justify-end gap-3">
          <button
            onclick="closePinModal()"
            class="rounded-full border border-white/30 px-4 py-2 text-sm uppercase tracking-widest text-white hover:bg-white/10 transition"
          >
            Cancel
          </button>
          <button
            onclick="submitPin()"
            class="rounded-full bg-white text-slate-950 px-4 py-2 text-sm uppercase tracking-widest transition hover:bg-slate-100"
          >
            Submit
          </button>
        </div>
      </div>
    </div>

    <div
      id="letter-content"
      class="opacity-0 hidden max-w-3xl mx-auto py-12 px-4 sm:px-8 relative z-10 transition-opacity duration-1000"
    >
      <div class="letter-container p-8 sm:p-16 relative">
        <button
          onclick="returnToLockScreen()"
          class="absolute right-8 top-8 rounded-full border border-ink bg-parchment/90 px-4 py-2 text-sm font-semibold uppercase tracking-wide text-ink transition hover:bg-ink hover:text-parchment"
        >
          Back
        </button>
        <div class="text-center mb-16">
          <h1 class="font-handwriting text-5xl sm:text-6xl text-wax mb-4">
            Happy Anniversary
          </h1>
          <p class="text-lg italic">The journey of our first 12 months...</p>
          <div class="w-16 h-[1px] bg-ink mx-auto mt-6"></div>
        </div>

        <div class="relative wrap overflow-hidden p-2 sm:p-10 h-full">
          <div
            class="absolute border-opacity-20 border-ink h-full border-l-2 left-1/2 transform -translate-x-1/2"
          ></div>

          <div id="timeline-wrapper" class="w-full"></div>
        </div>

        <div class="mt-16 text-center">
          <div class="w-16 h-[1px] bg-ink mx-auto mb-6"></div>
          <p class="font-handwriting text-3xl mt-4">With all my love,</p>
          <p class="font-handwriting text-2xl mt-2">CJay</p>
        </div>
      </div>
    </div>

    <script>
      const timelineData = [
        {
          month: "Month 1",
          title: "August 15, 2025",
          text: "Where it all started. The first time we really connected.",
        },
        {
          month: "Month 2",
          title: "September 15, 2025",
          text: "Late night conversations and learning about each other.",
        },
        {
          month: "Month 3",
          title: "October 15, 2025",
          text: "Our first trip or memorable date together.",
        },
        {
          month: "Month 4",
          title: "November 15, 2025",
          text: "The moments that made me realize how special this is.",
        },
        {
          month: "Month 5",
          title: "December 15, 2025",
          text: "Feeling entirely at home in your presence.",
        },
        {
          month: "Month 6",
          title: "January 15, 2026",
          text: "Six months of laughter, growth, and building trust.",
        },
        {
          month: "Month 7",
          title: "February 15, 2026",
          text: "A challenge we faced and overcame together.",
        },
        {
          month: "Month 8",
          title: "March 15, 2026",
          text: "Appreciating the simple days spent doing nothing.",
        },
        {
          month: "Month 9",
          title: "April 15, 2026",
          text: "Finding new favorite places and shared hobbies.",
        },
        {
          month: "Month 10",
          title: "May 15, 2026",
          text: "Starting to plan our future and dreaming together.",
        },
        {
          month: "Month 11",
          title: "June 15, 2026",
          text: "Knowing each other's flaws and loving them anyway.",
        },
        {
          month: "Month 12",
          title: "July 15, 2026",
          text: "365 days of us. Here is to a lifetime more.",
        },
      ];

      function renderTimeline() {
        const wrapper = document.getElementById("timeline-wrapper");
        let html = "";

        timelineData.forEach((item, index) => {
          const isEven = index % 2 === 0;
          html += `
                <div class="relative mb-8">
                    <div class="flex items-center w-full ${isEven ? "sm:justify-end" : "sm:justify-start"}">
                        <div class="w-full sm:w-[48%] flex ${isEven ? "justify-start" : "justify-end"}">
                            <div class="bg-[#fdf8f0] shadow-md w-full max-w-[720px] px-4 py-4 sm:px-6 border border-opacity-30 border-ink rounded">
                                <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-6">
                                    <div class="min-w-0">
                                        <h3 class="mb-1 font-semibold text-wax text-sm uppercase tracking-wider whitespace-nowrap">${item.month}</h3>
                                        <h4 class="font-bold text-lg whitespace-nowrap">${item.title}</h4>
                                    </div>
                                    <button onclick="openMonthModal(${index})" class="self-start inline-flex items-center justify-center rounded-full border border-ink px-3 py-1 text-[10px] font-semibold uppercase tracking-widest text-ink whitespace-nowrap transition hover:bg-ink hover:text-parchment">
                                        View Letter
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20 flex items-center justify-center bg-wax shadow-xl w-6 h-6 sm:w-8 sm:h-8 rounded-full border-2 border-parchment text-parchment font-semibold">
                        ${index + 1}
                    </div>
                </div>
                `;
        });
        wrapper.innerHTML = html;
      }

      function openMonthModal(index) {
        const item = timelineData[index];
        document.getElementById("modal-month").textContent = item.month;
        document.getElementById("modal-title").textContent = item.title;
        document.getElementById("modal-text").textContent = item.text;
        const modal = document.getElementById("month-modal");
        modal.classList.remove("hidden");
        document.body.classList.add("overflow-hidden");
      }

      function closeMonthModal() {
        const modal = document.getElementById("month-modal");
        modal.classList.add("hidden");
        document.body.classList.remove("overflow-hidden");
      }

      renderTimeline();

      const unlockPin = "071525";

      function openPinModal() {
        const modal = document.getElementById("pin-modal");
        const input = document.getElementById("pin-input");
        const error = document.getElementById("pin-error");
        input.value = "";
        error.classList.add("hidden");
        modal.classList.remove("hidden");
        setTimeout(() => input.focus(), 100);
      }

      function closePinModal() {
        document.getElementById("pin-modal").classList.add("hidden");
      }

      function submitPin() {
        const input = document.getElementById("pin-input");
        const error = document.getElementById("pin-error");
        if (input.value === unlockPin) {
          closePinModal();
          unlockLetter();
          return;
        }
        error.classList.remove("hidden");
      }

      function unlockLetter() {
        const lockScreen = document.getElementById("lock-screen");
        const letterContent = document.getElementById("letter-content");
        const music = document.getElementById("bg-music");

        // Play music
        music.play().catch((error) => console.log("Audio play failed:", error));

        // 1. Fade out the lock screen
        lockScreen.classList.remove("opacity-100");
        lockScreen.classList.add("opacity-0", "pointer-events-none");

        // 2. Wait for fade out, then switch displays
        setTimeout(() => {
          lockScreen.classList.add("hidden");
          letterContent.classList.remove("hidden");

          // 3. Tiny delay so the browser registers the element before fading it in
          setTimeout(() => {
            letterContent.classList.remove("opacity-0");
            letterContent.classList.add("opacity-100");
          }, 50);

          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 1000);
      }

      function returnToLockScreen() {
        const lockScreen = document.getElementById("lock-screen");
        const letterContent = document.getElementById("letter-content");
        const music = document.getElementById("bg-music");

        lockScreen.classList.remove(
          "hidden",
          "opacity-0",
          "pointer-events-none",
        );
        lockScreen.classList.add("opacity-100");

        letterContent.classList.add("opacity-0", "pointer-events-none");

        setTimeout(() => {
          letterContent.classList.add("hidden");
          letterContent.classList.remove("pointer-events-none");

          music.pause();
          music.currentTime = 0;
        }, 500);
      }
    </script>

    <div
      id="month-modal"
      class="fixed inset-0 hidden flex items-center justify-center bg-black/40 p-4 z-50"
    >
      <div
        class="relative w-full max-w-4xl rounded-3xl bg-parchment p-6 shadow-2xl border border-ink"
      >
        <button
          onclick="closeMonthModal()"
          class="absolute right-4 top-4 text-ink hover:text-wax"
        >
          <i class="fa-solid fa-xmark fa-lg"></i>
        </button>
        <h3
          id="modal-month"
          class="text-wax text-sm uppercase tracking-widest mb-2"
        ></h3>
        <h2 id="modal-title" class="text-3xl font-bold mb-4"></h2>
        <p
          id="modal-text"
          class="text-base italic leading-relaxed text-ink/90"
        ></p>
        <div class="mt-8 text-right">
          <button
            onclick="closeMonthModal()"
            class="inline-flex rounded-full border border-ink px-5 py-2 text-sm font-semibold uppercase tracking-wide text-ink transition hover:bg-ink hover:text-parchment"
          >
            Close
          </button>
        </div>
      </div>
    </div>

      let currentLockBg = 0;
      const bg1 = document.getElementById("lock-screen-bg1");
      const bg2 = document.getElementById("lock-screen-bg2");

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      function setLockBackground(index) {
        const nextImage = lockBgImages[index];
        if (!nextImage) return;
        bg2.style.backgroundImage = `url('${nextImage}')`;
        bg2.classList.add("opacity-100");
        bg1.classList.remove("opacity-100");

        setTimeout(() => {
          bg1.style.backgroundImage = `url('${nextImage}')`;
          bg1.classList.add("opacity-100");
          bg2.classList.remove("opacity-100");
        }, 1000);
      }

      function rotateLockBackground() {
        currentLockBg = (currentLockBg + 1) % lockBgImages.length;
        setLockBackground(currentLockBg);
      }

      // Preload and start rotation
      function initLockBackgrounds() {
        shuffleArray(lockBgImages);
        lockBgImages.forEach((src) => {
          const img = new Image();
          img.src = src;
        });
        setLockBackground(0);
        setInterval(rotateLockBackground, 5000);
      }

      document.addEventListener("DOMContentLoaded", initLockBackgrounds);
    </script>
